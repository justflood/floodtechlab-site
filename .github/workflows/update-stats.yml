name: Update Download Stats

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch OBS Forum download count and Release Info
        run: |
          # Fetch the OBS forum page
          HTML=$(curl -s -L --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (compatible; FloodTechLab-Stats/1.0)" \
            "https://obsproject.com/forum/resources/flood-tuber-native-pngtuber-plugin.2336/")

          # Parse "Downloads" from XenForo HTML structure
          FORUM_COUNT=$(echo "$HTML" | grep -A1 '<dt>Downloads</dt>' | grep '<dd>' | grep -oP '\d[\d,]*' | tr -d ',')
          
          if [[ -z "$FORUM_COUNT" || "$FORUM_COUNT" -le 0 ]]; then
            echo "ERROR: Could not parse download count. Falling back to 0."
            FORUM_COUNT=0
          fi

          # Fetch Latest Release from GitHub
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/justflood/flood-tuber/releases/latest")
          
          VERSION=$(echo "$RELEASE_JSON" | grep -oP '"tag_name":\s*"\K[^"]+')
          INSTALLER_URL=$(echo "$RELEASE_JSON" | grep -oP '"browser_download_url":\s*"\K[^"]+Installer[^"]+')
          PORTABLE_URL=$(echo "$RELEASE_JSON" | grep -oP '"browser_download_url":\s*"\K[^"]+Portable[^"]+')

          echo "Latest Version: $VERSION"
          echo "Installer URL: $INSTALLER_URL"
          echo "Portable URL: $PORTABLE_URL"

          # Update stats.json
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > stats.json << EOF
          {
            "obs_forum_downloads": $FORUM_COUNT,
            "latest_version": "$VERSION",
            "installer_url": "$INSTALLER_URL",
            "portable_url": "$PORTABLE_URL",
            "last_updated": "$TIMESTAMP"
          }
          EOF

          # Fix indentation
          sed -i 's/^          //' stats.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "📊 Update release info and stats [automated]"
          git push

